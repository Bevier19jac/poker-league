<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Schedule — Tod's Poker League S20</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="data.js"></script>
  <style>
    :root{--gold:#f5c842;--gold2:#e8a800;--gold3:#fde68a;--dark:#080810;--dark2:#0e0e1a;--card:#111122;--text:#f0f0f8;--dim:#8888aa;--faint:#3a3a55;--red:#ef4444;--green:#22c55e;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:3px}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:rgba(8,8,16,0.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(245,200,66,0.12)}
    .nav-brand{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;color:var(--gold);text-decoration:none}
    .nav-links{display:flex;gap:0.1rem;align-items:center}
    .nav-links a{color:var(--dim);text-decoration:none;font-size:0.72rem;font-weight:500;padding:0.32rem 0.65rem;border-radius:20px;transition:all 0.2s}
    .nav-links a:hover,.nav-links a.active{color:var(--gold);background:rgba(245,200,66,0.08)}
    .nav-links a.special{color:#fbbf24;border:1px solid rgba(251,191,36,0.28)}
    .nav-links a.special:hover{background:rgba(251,191,36,0.1)}
    .nav-admin{font-size:0.68rem;color:var(--faint);text-decoration:none;border:1px solid rgba(90,90,120,0.35);padding:0.26rem 0.65rem;border-radius:20px;transition:all 0.2s;margin-left:0.4rem}

    .page-hero{padding:100px 2rem 3.5rem;text-align:center;position:relative;overflow:hidden;background:
      repeating-linear-gradient(45deg,transparent 0,transparent 3px,rgba(0,60,15,0.025) 3px,rgba(0,60,15,0.025) 6px),
      radial-gradient(ellipse 80% 60% at 50% 0%,rgba(10,61,31,0.9) 0%,transparent 70%),var(--dark)}
    .hand-pair{position:absolute;z-index:0;display:flex;align-items:flex-end;filter:drop-shadow(0 8px 28px rgba(0,0,0,0.85))}
    .pc{width:50px;height:70px;background:linear-gradient(160deg,#fefefe,#f2f2ee);border-radius:6px;border:1px solid rgba(160,150,130,0.5);display:flex;flex-direction:column;justify-content:space-between;padding:3px 4px;position:relative;overflow:hidden;font-family:'Playfair Display',serif;font-weight:900}
    .pc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.5) 0%,transparent 55%);pointer-events:none}
    .pc::after{content:attr(data-s);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.7rem;line-height:1;opacity:0.09}
    .pc-t,.pc-b{display:flex;flex-direction:column;line-height:1}.pc-b{align-self:flex-end;transform:rotate(180deg)}
    .pc-r{font-size:0.85rem;line-height:1.05}.pc-s{font-size:0.64rem;line-height:1}
    .rc{color:#cc1a1a}.bk{color:#111118}
    @media(max-width:640px){.hand-pair{display:none}}
    .ph-eyebrow{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold2);font-family:'JetBrains Mono',monospace;margin-bottom:0.8rem;position:relative;z-index:1}
    .ph-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;color:#fff;position:relative;z-index:1}
    .ph-title span{color:var(--gold)}
    .ph-sub{font-size:0.88rem;color:var(--dim);margin-top:0.4rem;position:relative;z-index:1;margin-bottom:1.5rem}
    .progress-bar-wrap{position:relative;z-index:1;width:100%;max-width:500px;margin:0 auto}
    .pb-labels{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--dim);margin-bottom:6px}
    .pb-track{height:8px;background:var(--faint);border-radius:4px;overflow:hidden}
    .pb-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:4px;transition:width 1s ease}
    .pb-pct{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--gold);margin-top:5px;text-align:right}

    .page-content{max-width:820px;margin:0 auto;padding:3rem 1.5rem 5rem}
    .sched-grid{display:flex;flex-direction:column;gap:0.5rem}
    .sched-item{display:grid;grid-template-columns:100px 1fr auto;align-items:center;gap:1rem;padding:0.9rem 1.2rem;background:var(--dark2);border:1px solid rgba(245,200,66,0.07);border-radius:10px;transition:all 0.2s}
    .sched-item:hover{border-color:rgba(245,200,66,0.15)}
    .sched-item.completed{opacity:0.55}
    .sched-item.next-up{border-color:rgba(245,200,66,0.35);background:rgba(245,200,66,0.04);box-shadow:0 0 0 1px rgba(245,200,66,0.1)}
    .sched-item.tournament{border-color:rgba(251,191,36,0.35);background:rgba(251,191,36,0.05)}
    .sched-item.final{border-color:rgba(239,68,68,0.35);background:rgba(239,68,68,0.04)}
    .si-date{font-family:'JetBrains Mono',monospace;font-size:0.76rem;color:var(--dim)}
    .si-label{font-weight:600;font-size:0.88rem}
    .si-sub{font-size:0.72rem;color:var(--dim);margin-top:2px}
    .si-badge{font-size:0.68rem;font-weight:600;letter-spacing:0.04em;padding:3px 10px;border-radius:10px;white-space:nowrap}
    .si-badge.done{background:rgba(90,90,120,0.2);color:var(--faint)}
    .si-badge.next{background:rgba(245,200,66,0.15);color:var(--gold);border:1px solid rgba(245,200,66,0.3)}
    .si-badge.tourn{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.35)}
    .si-badge.final{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.35)}
    .si-badge.future{background:rgba(90,90,120,0.1);color:var(--dim)}

    footer{background:var(--dark2);border-top:1px solid rgba(245,200,66,0.08);padding:2rem;text-align:center}
    .f-links{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:0.9rem}
    .f-links a{color:var(--dim);text-decoration:none;font-size:0.76rem;padding:0.3rem 0.75rem;border:1px solid rgba(90,90,120,0.25);border-radius:20px;transition:all 0.2s}
    .f-links a:hover{color:var(--gold);border-color:rgba(245,200,66,0.3)}
    .f-links a.special{color:#fbbf24;border-color:rgba(251,191,36,0.3)}
    .f-credit{font-size:0.63rem;color:var(--faint);letter-spacing:0.08em;margin-top:0.5rem}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">♠ Tod's Poker League</a>
  <div class="nav-links">
    <a href="index.html">Home</a><a href="standings.html">Standings</a>
    <a href="results.html">Results</a><a href="schedule.html" class="active">Schedule</a>
    <a href="special.html" class="special">⭐ Mid-Season</a><a href="roster.html">Roster</a>
  </div>
  <a href="admin.html" class="nav-admin">Admin ⚙</a>
</nav>

<div class="page-hero">
  <!-- T♠9♠ suited connector — top left -->
  <div class="hand-pair" style="top:75px;left:2rem;opacity:0.72">
    <div class="pc bk" data-s="♠" style="transform:rotate(-7deg)">
      <div class="pc-t"><div class="pc-r">T</div><div class="pc-s">♠</div></div>
      <div class="pc-b"><div class="pc-r">T</div><div class="pc-s">♠</div></div>
    </div>
    <div class="pc bk" data-s="♠" style="transform:rotate(6deg);margin-left:-9px">
      <div class="pc-t"><div class="pc-r">9</div><div class="pc-s">♠</div></div>
      <div class="pc-b"><div class="pc-r">9</div><div class="pc-s">♠</div></div>
    </div>
  </div>
  <!-- 6♣4♦ — top right -->
  <div class="hand-pair" style="top:75px;right:2rem;opacity:0.5">
    <div class="pc bk" data-s="♣" style="transform:rotate(-5deg)">
      <div class="pc-t"><div class="pc-r">6</div><div class="pc-s">♣</div></div>
      <div class="pc-b"><div class="pc-r">6</div><div class="pc-s">♣</div></div>
    </div>
    <div class="pc rc" data-s="♦" style="transform:rotate(7deg);margin-left:-9px">
      <div class="pc-t"><div class="pc-r">4</div><div class="pc-s">♦</div></div>
      <div class="pc-b"><div class="pc-r">4</div><div class="pc-s">♦</div></div>
    </div>
  </div>
  <div class="ph-eyebrow">Season 20 · 2026</div>
  <div class="ph-title">Season <span>Schedule</span></div>
  <div class="ph-sub" id="schedSub">Loading...</div>
  <div class="progress-bar-wrap">
    <div class="pb-labels"><span id="pbLeft">0 complete</span><span id="pbRight">0 remaining</span></div>
    <div class="pb-track"><div class="pb-fill" id="pbFill" style="width:0%"></div></div>
    <div class="pb-pct" id="pbPct">0%</div>
  </div>
</div>

<div class="page-content">
  <div class="sched-grid" id="schedGrid"></div>
</div>

<footer>
  <div class="f-links">
    <a href="index.html">Home</a><a href="standings.html">Standings</a><a href="results.html">Results</a>
    <a href="schedule.html">Schedule</a><a href="special.html" class="special">⭐ Mid-Season</a><a href="roster.html">Roster</a>
  </div>
  <div class="f-credit">TOD'S POKER LEAGUE · SEASON 20 · PEACHTREE CITY, GA</div>
</footer>

<script>
var L=LEAGUE;
var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(str){
  var p=str.split('-').map(Number);
  var d=new Date(p[0],p[1]-1,p[2]);
  return days[d.getDay()]+' '+months[d.getMonth()]+' '+d.getDate()+', '+p[0];
}
var today=new Date();today.setHours(0,0,0,0);
var done=0,total=L.schedule.length,foundNext=false;
L.schedule.forEach(function(e){if(e.completed)done++;});
var pct=Math.round(done/total*100);
document.getElementById('pbFill').style.width=pct+'%';
document.getElementById('pbPct').textContent=pct+'%';
document.getElementById('pbLeft').textContent=done+' complete';
document.getElementById('pbRight').textContent=(total-done)+' remaining';
document.getElementById('schedSub').textContent='Season 20 · '+total+' events · Season Final: Sep 1st, 2026';

var grid=document.getElementById('schedGrid');
L.schedule.forEach(function(e){
  var p=e.date.split('-').map(Number);
  var ed=new Date(p[0],p[1]-1,p[2]);
  var isNext=!foundNext&&!e.completed&&ed>=today;
  if(isNext)foundNext=true;
  var cls='sched-item';
  if(e.completed)cls+=' completed';
  else if(isNext)cls+=' next-up';
  else if(e.type==='tournament')cls+=' tournament';
  else if(e.type==='final')cls+=' final';
  var badge='';
  if(e.completed)badge='<span class="si-badge done">✓ Complete</span>';
  else if(isNext)badge='<span class="si-badge next">▶ Up Next</span>';
  else if(e.type==='tournament')badge='<span class="si-badge tourn">⭐ Special</span>';
  else if(e.type==='final')badge='<span class="si-badge final">🏆 Final</span>';
  else badge='<span class="si-badge future">Upcoming</span>';
  var note=e.note?'<div class="si-sub">'+e.note+'</div>':'';
  var div=document.createElement('div');div.className=cls;
  var time=e.type==='tournament'?'Saturday · 12:00 PM TBD':(e.type==='final'?'TBD':'Thursday · 8:00 PM');
  div.innerHTML='<div class="si-date">'+fmtDate(e.date)+'</div><div><div class="si-label">'+e.label+'</div><div class="si-sub">'+time+'</div>'+note+'</div>'+badge;
  grid.appendChild(div);
});
</script>
</body>
</html>
