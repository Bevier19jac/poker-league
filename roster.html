<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Roster — Tod's Poker League S20</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="data.js"></script>
  <style>
    :root{--gold:#f5c842;--gold2:#e8a800;--gold3:#fde68a;--dark:#080810;--dark2:#0e0e1a;--card:#111122;--text:#f0f0f8;--dim:#8888aa;--faint:#3a3a55;--red:#ef4444;--green:#22c55e;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:3px}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:rgba(8,8,16,0.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(245,200,66,0.12)}
    .nav-brand{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;color:var(--gold);text-decoration:none}
    .nav-links{display:flex;gap:0.1rem;align-items:center}
    .nav-links a{color:var(--dim);text-decoration:none;font-size:0.72rem;font-weight:500;padding:0.32rem 0.65rem;border-radius:20px;transition:all 0.2s}
    .nav-links a:hover,.nav-links a.active{color:var(--gold);background:rgba(245,200,66,0.08)}
    .nav-links a.special{color:#fbbf24;border:1px solid rgba(251,191,36,0.28)}
    .nav-links a.special:hover{background:rgba(251,191,36,0.1)}
    .nav-admin{font-size:0.68rem;color:var(--faint);text-decoration:none;border:1px solid rgba(90,90,120,0.35);padding:0.26rem 0.65rem;border-radius:20px;transition:all 0.2s;margin-left:0.4rem}

    .page-hero{padding:100px 2rem 3.5rem;text-align:center;position:relative;overflow:hidden;background:
      repeating-linear-gradient(45deg,transparent 0,transparent 3px,rgba(0,60,15,0.025) 3px,rgba(0,60,15,0.025) 6px),
      radial-gradient(ellipse 80% 60% at 50% 0%,rgba(10,61,31,0.9) 0%,transparent 70%),var(--dark)}
    .hand-pair{position:absolute;z-index:0;display:flex;align-items:flex-end;filter:drop-shadow(0 8px 28px rgba(0,0,0,0.85))}
    .pc{width:50px;height:70px;background:linear-gradient(160deg,#fefefe,#f2f2ee);border-radius:6px;border:1px solid rgba(160,150,130,0.5);display:flex;flex-direction:column;justify-content:space-between;padding:3px 4px;position:relative;overflow:hidden;font-family:'Playfair Display',serif;font-weight:900}
    .pc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.5) 0%,transparent 55%);pointer-events:none}
    .pc::after{content:attr(data-s);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.7rem;line-height:1;opacity:0.09}
    .pc-t,.pc-b{display:flex;flex-direction:column;line-height:1}.pc-b{align-self:flex-end;transform:rotate(180deg)}
    .pc-r{font-size:0.85rem;line-height:1.05}.pc-s{font-size:0.64rem;line-height:1}
    .rc{color:#cc1a1a}.bk{color:#111118}
    @media(max-width:640px){.hand-pair{display:none}}
    .ph-eyebrow{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold2);font-family:'JetBrains Mono',monospace;margin-bottom:0.8rem;position:relative;z-index:1}
    .ph-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;color:#fff;position:relative;z-index:1}
    .ph-title span{color:var(--gold)}
    .ph-sub{font-size:0.88rem;color:var(--dim);margin-top:0.4rem;position:relative;z-index:1}

    .page-content{max-width:1200px;margin:0 auto;padding:3rem 1.5rem 5rem}
    .roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
    .player-card{background:var(--dark2);border:1px solid rgba(245,200,66,0.08);border-radius:14px;padding:1.4rem 1rem 1.2rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:0.5rem;transition:border-color 0.2s,transform 0.2s;cursor:default}
    .player-card:hover{border-color:rgba(245,200,66,0.2);transform:translateY(-2px)}
    .player-card.top3{border-color:rgba(245,200,66,0.2);background:rgba(245,200,66,0.04)}
    .pc-name{font-size:0.95rem;font-weight:700;margin-top:0.2rem}
    .pc-fullname{font-size:0.72rem;color:var(--dim);margin-top:-0.2rem}
    .pc-rank{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--gold2);letter-spacing:0.06em}
    .pc-stats{display:flex;gap:1rem;margin-top:0.4rem;justify-content:center}
    .pcs-item{text-align:center}
    .pcs-val{font-family:'JetBrains Mono',monospace;font-size:0.88rem;font-weight:700;color:var(--text)}
    .pcs-lbl{font-size:0.55rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint);margin-top:2px}
    .pc-wins{display:flex;gap:0.3rem;margin-top:0.3rem;justify-content:center;flex-wrap:wrap}
    .win-star{font-size:0.75rem;color:var(--gold)}
    .chip-wrap{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .medal-rank{font-size:1.2rem;position:absolute;top:0.6rem;right:0.8rem}
    .player-card{position:relative}

    footer{background:var(--dark2);border-top:1px solid rgba(245,200,66,0.08);padding:2rem;text-align:center}
    .f-links{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:0.9rem}
    .f-links a{color:var(--dim);text-decoration:none;font-size:0.76rem;padding:0.3rem 0.75rem;border:1px solid rgba(90,90,120,0.25);border-radius:20px;transition:all 0.2s}
    .f-links a:hover{color:var(--gold);border-color:rgba(245,200,66,0.3)}
    .f-links a.special{color:#fbbf24;border-color:rgba(251,191,36,0.3)}
    .f-credit{font-size:0.63rem;color:var(--faint);letter-spacing:0.08em;margin-top:0.5rem}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">♠ Tod's Poker League</a>
  <div class="nav-links">
    <a href="index.html">Home</a><a href="standings.html">Standings</a>
    <a href="results.html">Results</a><a href="schedule.html">Schedule</a>
    <a href="special.html" class="special">⭐ Mid-Season</a><a href="roster.html" class="active">Roster</a>
  </div>
  <a href="admin.html" class="nav-admin">Admin ⚙</a>
</nav>

<div class="page-hero">
  <!-- 5♣5♦ Nickels — top left -->
  <div class="hand-pair" style="top:75px;left:2rem;opacity:0.7">
    <div class="pc bk" data-s="♣" style="transform:rotate(-7deg)">
      <div class="pc-t"><div class="pc-r">5</div><div class="pc-s">♣</div></div>
      <div class="pc-b"><div class="pc-r">5</div><div class="pc-s">♣</div></div>
    </div>
    <div class="pc rc" data-s="♦" style="transform:rotate(6deg);margin-left:-9px">
      <div class="pc-t"><div class="pc-r">5</div><div class="pc-s">♦</div></div>
      <div class="pc-b"><div class="pc-r">5</div><div class="pc-s">♦</div></div>
    </div>
  </div>
  <!-- K♠Q♠ — top right -->
  <div class="hand-pair" style="top:75px;right:2rem;opacity:0.7">
    <div class="pc bk" data-s="♠" style="transform:rotate(-5deg)">
      <div class="pc-t"><div class="pc-r">K</div><div class="pc-s">♠</div></div>
      <div class="pc-b"><div class="pc-r">K</div><div class="pc-s">♠</div></div>
    </div>
    <div class="pc bk" data-s="♠" style="transform:rotate(7deg);margin-left:-9px">
      <div class="pc-t"><div class="pc-r">Q</div><div class="pc-s">♠</div></div>
      <div class="pc-b"><div class="pc-r">Q</div><div class="pc-s">♠</div></div>
    </div>
  </div>
  <div class="ph-eyebrow">Season 20 · Active Players</div>
  <div class="ph-title">Player <span>Roster</span></div>
  <div class="ph-sub" id="rosterSub">Loading...</div>
</div>

<div class="page-content">
  <div class="roster-grid" id="rosterGrid"></div>
</div>

<footer>
  <div class="f-links">
    <a href="index.html">Home</a><a href="standings.html">Standings</a><a href="results.html">Results</a>
    <a href="schedule.html">Schedule</a><a href="special.html" class="special">⭐ Mid-Season</a><a href="roster.html">Roster</a>
  </div>
  <div class="f-credit">TOD'S POKER LEAGUE · SEASON 20 · PEACHTREE CITY, GA</div>
</footer>

<script>
var L=LEAGUE;
var CHIP_COLORS=[{bg:'#dc2626',rim:'#7f1d1d'},{bg:'#2563eb',rim:'#1e3a8a'},{bg:'#16a34a',rim:'#14532d'},{bg:'#7c3aed',rim:'#4c1d95'},{bg:'#d97706',rim:'#78350f'},{bg:'#0891b2',rim:'#164e63'},{bg:'#db2777',rim:'#831843'},{bg:'#ea580c',rim:'#7c2d12'},{bg:'#4f46e5',rim:'#312e81'},{bg:'#0d9488',rim:'#134e4a'}];
var medals=['🥇','🥈','🥉'];
var suits=['♠','♥','♦','♣'];
function chipHtml(p,i,size){
  var c=CHIP_COLORS[i%CHIP_COLORS.length],inner=Math.round(size*0.62),es=Math.round(inner*0.55);
  var face=p.avatar?'<img src="'+p.avatar+'" style="width:'+inner+'px;height:'+inner+'px;object-fit:cover;border-radius:50%;border:1.5px solid rgba(255,255,255,0.35)">':'<span style="font-size:'+es+'px;line-height:1">'+suits[i%4]+'</span>';
  return '<div class="chip-wrap" style="width:'+size+'px;height:'+size+'px;background:radial-gradient(circle,'+c.bg+' 54%,transparent 54%),repeating-conic-gradient('+c.rim+' 0deg 20deg,rgba(255,255,255,0.65) 20deg 40deg);box-shadow:0 0 0 2px '+c.rim+',0 4px 14px rgba(0,0,0,0.55)">'+face+'</div>';
}
document.getElementById('rosterSub').textContent=L.standings.length+' players · Season 20';
var grid=document.getElementById('rosterGrid');
L.standings.forEach(function(p,i){
  var isTop3=i<3;
  var div=document.createElement('div');
  div.className='player-card'+(isTop3?' top3':'');
  var medal=isTop3?'<span class="medal-rank">'+medals[i]+'</span>':'';
  var winStars='';
  for(var w=0;w<(p.wins||0);w++)winStars+='<span class="win-star">★</span>';
  var rankLabel='#'+(i+1)+' · '+p.points.toLocaleString()+' pts';
  var sn=p.fullName&&p.fullName!==p.name?p.fullName:'';
  div.innerHTML=medal+chipHtml(p,i,68)+'<div class="pc-name">'+p.name+'</div>'+(sn?'<div class="pc-fullname">'+sn+'</div>':'')+'<div class="pc-rank">'+rankLabel+'</div>'+
    '<div class="pc-stats"><div class="pcs-item"><div class="pcs-val">'+p.events+'</div><div class="pcs-lbl">Events</div></div><div class="pcs-item"><div class="pcs-val">'+(p.wins||0)+'</div><div class="pcs-lbl">Wins</div></div><div class="pcs-item"><div class="pcs-val">'+(p.cashes||0)+'</div><div class="pcs-lbl">Cashes</div></div></div>'+(winStars?'<div class="pc-wins">'+winStars+'</div>':'');
  grid.appendChild(div);
});
</script>
</body>
</html>
