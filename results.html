<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Results — Tod's Poker League S20</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="data.js"></script>
  <style>
    :root{--gold:#f5c842;--gold2:#e8a800;--gold3:#fde68a;--wood:#5c3a1e;--wood2:#3d2510;--dark:#080810;--dark2:#0e0e1a;--card:#111122;--text:#f0f0f8;--dim:#8888aa;--faint:#3a3a55;--red:#ef4444;--green:#22c55e;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:3px}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:rgba(8,8,16,0.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(245,200,66,0.12)}
    .nav-brand{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;color:var(--gold);text-decoration:none}
    .nav-links{display:flex;gap:0.1rem;align-items:center}
    .nav-links a{color:var(--dim);text-decoration:none;font-size:0.72rem;font-weight:500;letter-spacing:0.04em;padding:0.32rem 0.65rem;border-radius:20px;transition:all 0.2s}
    .nav-links a:hover,.nav-links a.active{color:var(--gold);background:rgba(245,200,66,0.08)}
    .nav-links a.special{color:#fbbf24;border:1px solid rgba(251,191,36,0.28)}
    .nav-links a.special:hover{background:rgba(251,191,36,0.1)}
    .nav-admin{font-size:0.68rem;color:var(--faint);text-decoration:none;border:1px solid rgba(90,90,120,0.35);padding:0.26rem 0.65rem;border-radius:20px;transition:all 0.2s;margin-left:0.4rem}
    .nav-admin:hover{color:var(--dim);border-color:var(--dim)}

    .page-hero{padding:100px 2rem 3.5rem;text-align:center;position:relative;overflow:hidden;background:
      repeating-linear-gradient(45deg,transparent 0,transparent 3px,rgba(0,60,15,0.025) 3px,rgba(0,60,15,0.025) 6px),
      radial-gradient(ellipse 80% 60% at 50% 0%,rgba(10,61,31,0.9) 0%,transparent 70%),var(--dark)}
    .hand-pair{position:absolute;z-index:0;display:flex;align-items:flex-end;filter:drop-shadow(0 8px 28px rgba(0,0,0,0.85))}
    .pc{width:50px;height:70px;background:linear-gradient(160deg,#fefefe,#f2f2ee);border-radius:6px;border:1px solid rgba(160,150,130,0.5);display:flex;flex-direction:column;justify-content:space-between;padding:3px 4px;position:relative;overflow:hidden;font-family:'Playfair Display',serif;font-weight:900}
    .pc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.5) 0%,transparent 55%);pointer-events:none}
    .pc::after{content:attr(data-s);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.7rem;line-height:1;opacity:0.09}
    .pc-t,.pc-b{display:flex;flex-direction:column;line-height:1}.pc-b{align-self:flex-end;transform:rotate(180deg)}
    .pc-r{font-size:0.85rem;line-height:1.05}.pc-s{font-size:0.64rem;line-height:1}
    .rc{color:#cc1a1a}.bk{color:#111118}
    @media(max-width:640px){.hand-pair{display:none}}
    .ph-eyebrow{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold2);font-family:'JetBrains Mono',monospace;margin-bottom:0.8rem;position:relative;z-index:1}
    .ph-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;color:#fff;position:relative;z-index:1}
    .ph-title span{color:var(--gold)}
    .ph-sub{font-size:0.88rem;color:var(--dim);margin-top:0.4rem;position:relative;z-index:1}

    .page-content{max-width:900px;margin:0 auto;padding:3rem 1.5rem 5rem}

    /* LAST GAME CARD */
    .game-card{background:var(--dark2);border:1px solid rgba(245,200,66,0.12);border-radius:16px;overflow:hidden;margin-bottom:2.5rem}
    .gc-header{background:linear-gradient(135deg,#0c4a23,#083518 60%,#0a3d1f);padding:1.2rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.8rem;border-bottom:2px solid rgba(245,200,66,0.15)}
    .gc-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold3);font-weight:700}
    .gc-meta{font-size:0.76rem;color:var(--dim)}
    .gc-recap{padding:1.2rem 1.5rem;font-size:0.85rem;color:var(--dim);border-bottom:1px solid rgba(255,255,255,0.05);line-height:1.6}
    .gc-recap strong{color:var(--text)}
    .gc-stats{display:flex;gap:2rem;padding:1rem 1.5rem;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.05)}
    .gcs-item{text-align:center}
    .gcs-val{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--gold)}
    .gcs-lbl{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-top:3px}

    /* RESULTS TABLE */
    table{width:100%;border-collapse:collapse;font-size:0.83rem}
    thead th{background:rgba(6,43,21,0.8);color:var(--gold2);font-size:0.63rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.65rem 0.8rem;text-align:left;border-bottom:1px solid rgba(245,200,66,0.12);white-space:nowrap}
    thead th.num{text-align:right}
    tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s}
    tbody tr:hover{background:rgba(245,200,66,0.03)}
    tbody tr.itm{background:rgba(245,200,66,0.05)}
    td{padding:0.6rem 0.8rem;vertical-align:middle}
    td.num{text-align:right;font-family:'JetBrains Mono',monospace}
    .place-medal{font-size:1rem}
    .place-num{font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--dim)}
    .itm-badge{display:inline-block;background:rgba(245,200,66,0.12);border:1px solid rgba(245,200,66,0.25);border-radius:8px;padding:1px 7px;font-size:0.65rem;color:var(--gold);margin-left:6px}
    .winnings-cell{color:var(--green);font-weight:600}
    .points-cell{color:var(--text);font-weight:500}

    .section-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--gold);letter-spacing:0.05em;margin-bottom:1.2rem;display:flex;align-items:center;gap:0.5rem}

    footer{background:var(--dark2);border-top:1px solid rgba(245,200,66,0.08);padding:2rem;text-align:center}
    .f-links{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:0.9rem}
    .f-links a{color:var(--dim);text-decoration:none;font-size:0.76rem;padding:0.3rem 0.75rem;border:1px solid rgba(90,90,120,0.25);border-radius:20px;transition:all 0.2s}
    .f-links a:hover{color:var(--gold);border-color:rgba(245,200,66,0.3)}
    .f-links a.special{color:#fbbf24;border-color:rgba(251,191,36,0.3)}
    .f-credit{font-size:0.63rem;color:var(--faint);letter-spacing:0.08em;margin-top:0.5rem}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">♠ Tod's Poker League</a>
  <div class="nav-links">
    <a href="index.html">Home</a><a href="standings.html">Standings</a>
    <a href="results.html" class="active">Results</a><a href="schedule.html">Schedule</a>
    <a href="special.html" class="special">⭐ Mid-Season</a><a href="roster.html">Roster</a>
  </div>
  <a href="admin.html" class="nav-admin">Admin ⚙</a>
</nav>

<div class="page-hero">
  <!-- 8♠8♣ Snowmen — top left -->
  <div class="hand-pair" style="top:75px;left:2rem;opacity:0.72">
    <div class="pc bk" data-s="♠" style="transform:rotate(-7deg)">
      <div class="pc-t"><div class="pc-r">8</div><div class="pc-s">♠</div></div>
      <div class="pc-b"><div class="pc-r">8</div><div class="pc-s">♠</div></div>
    </div>
    <div class="pc bk" data-s="♣" style="transform:rotate(6deg);margin-left:-9px">
      <div class="pc-t"><div class="pc-r">8</div><div class="pc-s">♣</div></div>
      <div class="pc-b"><div class="pc-r">8</div><div class="pc-s">♣</div></div>
    </div>
  </div>
  <!-- Q♥Q♦ Ladies — top right -->
  <div class="hand-pair" style="top:75px;right:2rem;opacity:0.72">
    <div class="pc rc" data-s="♥" style="transform:rotate(-5deg)">
      <div class="pc-t"><div class="pc-r">Q</div><div class="pc-s">♥</div></div>
      <div class="pc-b"><div class="pc-r">Q</div><div class="pc-s">♥</div></div>
    </div>
    <div class="pc rc" data-s="♦" style="transform:rotate(7deg);margin-left:-9px">
      <div class="pc-t"><div class="pc-r">Q</div><div class="pc-s">♦</div></div>
      <div class="pc-b"><div class="pc-r">Q</div><div class="pc-s">♦</div></div>
    </div>
  </div>
  <div class="ph-eyebrow">Season 20 · Game Recap</div>
  <div class="ph-title">Last <span>Game</span> Results</div>
  <div class="ph-sub" id="lgSubtitle">Loading...</div>
</div>

<div class="page-content">
  <div id="lastGameDiv"></div>
</div>

<footer>
  <div class="f-links">
    <a href="index.html">Home</a><a href="standings.html">Standings</a><a href="results.html">Results</a>
    <a href="schedule.html">Schedule</a><a href="special.html" class="special">⭐ Mid-Season</a><a href="roster.html">Roster</a>
  </div>
  <div class="f-credit">TOD'S POKER LEAGUE · SEASON 20 · PEACHTREE CITY, GA</div>
</footer>

<script>
var L=LEAGUE,lg=L.lastGame;
var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
var medals=['🥇','🥈','🥉'];

document.getElementById('lgSubtitle').textContent=lg.label+' · '+lg.date+' · '+lg.playerCount+' players';

var div=document.getElementById('lastGameDiv');
var html='<div class="game-card">';
html+='<div class="gc-header"><div class="gc-title">'+lg.label+'</div><div class="gc-meta">'+lg.date+' · '+lg.playerCount+' players · $'+lg.kitty+' kitty</div></div>';
if(lg.recap)html+='<div class="gc-recap">'+lg.recap+'</div>';
html+='<div class="gc-stats"><div class="gcs-item"><div class="gcs-val">'+lg.playerCount+'</div><div class="gcs-lbl">Players</div></div><div class="gcs-item"><div class="gcs-val">$'+lg.kitty+'</div><div class="gcs-lbl">Kitty</div></div><div class="gcs-item"><div class="gcs-val">'+lg.winner+'</div><div class="gcs-lbl">Winner</div></div></div>';
html+='<div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Player</th><th class="num">Points Earned</th><th class="num">Winnings</th></tr></thead><tbody>';
lg.results.forEach(function(r){
  var itm=r.itm?'<span class="itm-badge">ITM</span>':'';
  var medal=r.place<=3?'<span class="place-medal">'+medals[r.place-1]+'</span> ':'<span class="place-num">'+r.place+'</span> ';
  var win=r.winnings>0?'<td class="num winnings-cell">$'+r.winnings+'</td>':'<td class="num" style="color:var(--faint)">—</td>';
  var row=r.itm?'class="itm"':'';
  html+='<tr '+row+'><td>'+medal+'</td><td>'+r.name+itm+'</td><td class="num points-cell">'+r.points.toLocaleString()+'</td>'+win+'</tr>';
});
html+='</tbody></table></div>';
if(lg.highHand&&lg.highHand.player){
  html+='<div style="padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:0.8rem"><span style="font-size:1.2rem">🃏</span><div><div style="font-size:0.75rem;color:var(--gold);font-weight:600">High Hand</div><div style="font-size:0.85rem">'+lg.highHand.player+' — '+lg.highHand.hand+'</div><div style="font-size:0.75rem;color:var(--dim)">'+lg.highHand.description+'</div></div></div>';
}
html+='</div>';
div.innerHTML=html;
</script>
</body>
</html>
